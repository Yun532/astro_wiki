name: Deploy Starlight site to GitHub Pages
on:
  push:
    branches: [ main, combine-grb-course-snapshot-20260529 ]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Build graph
        run: python scripts/build_graph.py
      - name: Prepare Starlight content
        run: python scripts/prepare_starlight_site.py
      - name: Install dependencies
        working-directory: site
        run: npm ci
      - name: Build site
        working-directory: site
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
